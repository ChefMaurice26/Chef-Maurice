<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef Maurice's Kitchen | Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#f4f4f4;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{width:420px;background:#fff;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.2);overflow:hidden}
.header{background:#b40000;color:#fff;text-align:center;padding:30px}
.header h1{font-size:28px;margin-bottom:8px}
.header p{font-size:14px}
.content{padding:30px}
label{display:block;margin-bottom:8px;font-weight:600}
input{width:100%;padding:14px;border-radius:8px;border:1px solid #ccc;margin-bottom:18px;font-size:16px}
button{width:100%;background:#b40000;color:#fff;border:none;padding:15px;border-radius:8px;cursor:pointer;font-size:17px;font-weight:600}
button:hover{background:#8e0000}
.message{margin-top:20px;text-align:center;font-weight:600}
.success{color:green}
.error{color:red}
.loading{display:none;text-align:center;margin-top:20px}
.footer{text-align:center;padding:20px;font-size:13px;color:#777}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Chef Maurice's Kitchen</h1>
<p>Owner Password Reset</p>
</div>
<div class="content">
<form id="resetForm">
<label>New Password</label>
<input type="password" id="password" placeholder="Enter new password" required>
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm password" required>
<button id="resetButton" type="submit">Update Password</button>
</form>
<div class="loading" id="loading">Updating Password...</div>
<div class="message" id="message"></div>
</div>
<div class="footer">Chef Maurice's Kitchen Owner Portal</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/reset-password.js"></script>
</body>
</html>
